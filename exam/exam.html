<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Take Exam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 id="examTitle" class="mb-0">Loading exam...</h2>
      <div class="d-flex align-items-center gap-2">
        <span id="timerBadge" class="badge text-bg-warning">20:00</span>
        <a href="index.html" class="btn btn-outline-secondary btn-sm">Back</a>
      </div>
    </div>

    <div id="alertBox"></div>

    <form id="examForm" class="card p-3 p-md-4 shadow-sm">
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">Student Name</label>
          <input id="studentName" type="text" class="form-control" required />
        </div>
        <div class="col-md-6">
          <label class="form-label">Student ID</label>
          <input id="studentId" type="text" class="form-control" required />
        </div>
      </div>

      <div id="questionsContainer"></div>

      <button type="submit" class="btn btn-success mt-3">Submit Exam</button>
    </form>
  </div>

  <script src="js/exam.js"></script>
</body>
</html>
